<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Credit Report | D-LOAN OFFERS</title>

<style>
:root{
    --primary:#1E40AF;
    --success:#10b981;
    --bg:#f8fafc;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:var(--bg);
    padding:20px;
}

.container{
    max-width:1200px;
    margin:auto;
}

.report-card{
    background:white;
    border-radius:18px;
    padding:25px;
    margin-bottom:20px;
    box-shadow:0 4px 15px rgba(0,0,0,.08);
}

.header{
    text-align:center;
    margin-bottom:20px;
}

.header h1{
    color:var(--primary);
}

.score-box{
    text-align:center;
    padding:25px;
}

.score-circle{
    width:180px;
    height:180px;
    border-radius:50%;
    background:linear-gradient(135deg,#1E40AF,#2563EB);
    color:white;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    margin:auto;
}

.score-number{
    font-size:48px;
    font-weight:bold;
}

.score-label{
    font-size:14px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:15px;
}

.info{
    background:#f1f5f9;
    padding:15px;
    border-radius:12px;
}

.info strong{
    display:block;
    margin-bottom:5px;
}

.btn{
    display:inline-block;
    background:var(--success);
    color:white;
    text-decoration:none;
    padding:12px 18px;
    border-radius:10px;
    margin-top:15px;
    border:none;
    cursor:pointer;
}

.section-title{
    margin:25px 0 15px;
    color:var(--primary);
}

/* loan cards from index */

.loan-list{
    display:grid;
    grid-template-columns:1fr;
    gap:20px;
}

@media(min-width:768px){
.loan-list{
grid-template-columns:1fr 1fr;
}
}

.loan-card{
background:linear-gradient(135deg,#1E40AF,#2563EB);
border-radius:16px;
padding:18px;
color:white;
position:relative;
overflow:hidden;
box-shadow:0 8px 20px rgba(0,0,0,.15);
}

.badge{
position:absolute;
top:12px;
right:12px;
background:#d1fae5;
color:#065f46;
padding:5px 10px;
border-radius:20px;
font-size:11px;
font-weight:bold;
}

.logo-row{
display:flex;
align-items:center;
gap:12px;
margin-bottom:15px;
}

.logo-row img{
width:45px;
height:45px;
border-radius:10px;
background:white;
padding:5px;
object-fit:contain;
}

.nbfc-name{
font-size:24px;
font-weight:800;
}

.details-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
margin:15px 0;
}

.detail-item{
background:rgba(255,255,255,.15);
padding:10px;
border-radius:10px;
text-align:center;
}

.apply-btn{
display:block;
text-align:center;
background:#10b981;
color:white;
padding:14px;
border-radius:10px;
text-decoration:none;
font-weight:bold;
}

@media print{
button{
display:none;
}
}
</style>
</head>

<body>

<div class="container">

<div class="report-card">

<div class="header">
<h1>D-LOAN OFFERS</h1>
<p>Credit Assessment Report</p>
</div>

<div class="score-box">

<div class="score-circle">
<div class="score-number" id="score">0</div>
<div class="score-label">Credit Score</div>
</div>

<h2 id="rating"></h2>

<button class="btn" onclick="window.print()">
🖨 Print / Save PDF
</button>

</div>

</div>

<div class="report-card">

<h2>User Information</h2>

<div class="grid">

<div class="info">
<strong>Name</strong>
<span id="name"></span>
</div>

<div class="info">
<strong>Mobile</strong>
<span id="mobile"></span>
</div>

<div class="info">
<strong>PAN</strong>
<span id="pan"></span>
</div>

<div class="info">
<strong>City</strong>
<span id="city"></span>
</div>

<div class="info">
<strong>Income</strong>
<span id="income"></span>
</div>

<div class="info">
<strong>Report Date</strong>
<span id="reportDate"></span>
</div>

</div>

</div>

<div class="report-card">

<h2 class="section-title">
🏦 Recommended Loan Offers
</h2>

<div id="loanOffers"></div>

</div>

</div>

<script>

/* Load User Data */

const data = JSON.parse(
localStorage.getItem("creditReportData")
);

if(!data){
alert("No report data found");
window.location.href="credit-score.html";
}

document.getElementById("name").innerText =
(data.firstName || "") + " " + (data.lastName || "");

document.getElementById("mobile").innerText =
data.mobile || "-";

document.getElementById("pan").innerText =
data.pan || "-";

document.getElementById("city").innerText =
data.city || "-";

document.getElementById("income").innerText =
"₹" + (data.income || 0);

document.getElementById("reportDate").innerText =
data.reportDate || "-";

document.getElementById("score").innerText =
data.score || 650;

const score = parseInt(data.score || 650);

let rating = "Fair";

if(score >= 800){
rating = "Excellent";
}
else if(score >= 750){
rating = "Very Good";
}
else if(score >= 700){
rating = "Good";
}
else if(score >= 650){
rating = "Average";
}
else{
rating = "Needs Improvement";
}

document.getElementById("rating").innerText =
rating;


/* Load Loan Cards Automatically */

async function loadLoanOffers(){

try{

const response = await fetch("index.html");
const html = await response.text();

const parser = new DOMParser();

const doc =
parser.parseFromString(html,"text/html");

const loanList =
doc.querySelector(".loan-list");

if(loanList){

document.getElementById("loanOffers")
.innerHTML =
'<div class="loan-list">' +
loanList.innerHTML +
'</div>';

}

}catch(err){

document.getElementById("loanOffers")
.innerHTML =
"<p>Unable to load loan offers.</p>";

console.error(err);

}

}

loadLoanOffers();

</script>

</body>
</html>
