<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Credit Report | D-LOAN OFFERS</title>
    <style>
        :root{
            --primary:#1E40AF;
            --secondary:#2563EB;
            --success:#10b981;
            --light:#f8fafc;
            --dark:#0f172a;
        }
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }
        body{
            background:#f8fafc;
            padding-bottom:90px;
        }
        .top-header{
            position:sticky;
            top:0;
            z-index:999;
            background:#0f172a;
            padding:14px 18px;
            display:flex;
            align-items:center;
            box-shadow:0 4px 12px rgba(0,0,0,.15);
        }
        .header-left{
            display:flex;
            align-items:center;
            gap:12px;
        }
        .header-logo{
            width:42px;
            height:42px;
            background:white;
            border-radius:12px;
            padding:5px;
        }
        .app-name{
            color:white;
            font-size:24px;
            font-weight:900;
        }
        .container{
            max-width:1200px;
            margin:auto;
            padding:20px;
        }
        .report-card{
            background:white;
            border-radius:20px;
            padding:25px;
            margin-bottom:20px;
            box-shadow:0 5px 20px rgba(0,0,0,.08);
        }
        .report-header{
            text-align:center;
        }
        .report-header h1{
            color:#1E40AF;
            margin-bottom:10px;
        }
        .score-section{
            text-align:center;
            padding:20px 0;
        }
        .score-circle{
            width:220px;
            height:220px;
            margin:auto;
            border-radius:50%;
            background:linear-gradient(135deg,#1E40AF,#2563EB);
            display:flex;
            align-items:center;
            justify-content:center;
            flex-direction:column;
            color:white;
            box-shadow:0 10px 30px rgba(37,99,235,.3);
        }
        .score-number{
            font-size:58px;
            font-weight:900;
        }
        .score-text{
            font-size:16px;
        }
        .rating{
            font-size:28px;
            font-weight:700;
            margin-top:20px;
            color:#1E40AF;
        }
        .approval{
            margin-top:10px;
            font-size:18px;
            color:#10b981;
            font-weight:700;
        }
        .grid{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
            gap:15px;
        }
        .info-box{
            background:#f1f5f9;
            padding:15px;
            border-radius:12px;
        }
        .info-label{
            font-size:13px;
            color:#64748b;
            margin-bottom:5px;
        }
        .info-value{
            font-size:16px;
            font-weight:700;
            color:#0f172a;
        }
        .btn-row{
            display:flex;
            gap:10px;
            flex-wrap:wrap;
            margin-top:20px;
        }
        .btn{
            border:none;
            padding:14px 18px;
            border-radius:12px;
            cursor:pointer;
            font-weight:700;
        }
        .btn-primary{
            background:#1E40AF;
            color:white;
        }
        .btn-success{
            background:#10b981;
            color:white;
        }
        .section-title{
            font-size:24px;
            margin-bottom:15px;
            color:#1E40AF;
        }
        .loan-list{
            display:grid;
            grid-template-columns:1fr;
            gap:20px;
        }
        @media(min-width:768px){
            .loan-list{ grid-template-columns:1fr 1fr; }
        }
        .bottom-nav{
            position:fixed;
            bottom:0;
            left:0;
            width:100%;
            height:70px;
            background:#fff;
            display:flex;
            justify-content:space-evenly;
            align-items:center;
            box-shadow:0 -4px 12px rgba(0,0,0,.12);
            z-index:999;
        }
        .nav-btn{
            flex:1;
            display:flex;
            flex-direction:column;
            align-items:center;
            justify-content:center;
            font-size:11px;
            font-weight:600;
            color:#64748b;
            cursor:pointer;
        }
        .nav-icon{
            font-size:20px;
            margin-bottom:3px;
        }
        .nav-btn.active{
            color:#10b981;
        }
        .back-btn{
            display:block;
            text-align:center;
            background:#2563eb;
            color:#fff;
            padding:14px;
            border-radius:12px;
            text-decoration:none;
            font-weight:700;
            margin-top:20px;
        }
        /* CARD CSS FROM HOMEPAGE */
        .loan-card{
            background:linear-gradient(135deg, #1E40AF, #2563EB);
            border-radius:16px;
            padding:18px;
            min-height:280px;
            position:relative;
            overflow:hidden;
            display:flex;
            flex-direction:column;
            justify-content:space-between;
            box-shadow:0 8px 20px rgba(0,0,0,0.20);
            color:white;
        }
        .badge{
            position:absolute;
            top:12px;
            right:12px;
            background:#d1fae5;
            color:#065f46;
            padding:5px 10px;
            border-radius:20px;
            font-size:11px;
            font-weight:bold;
        }
        .logo-row{
            display:flex;
            align-items:center;
            gap:12px;
            margin-bottom:15px;
        }
        .logo-row img{
            width:45px;
            height:45px;
            border-radius:10px;
            background:white;
            padding:5px;
            object-fit:contain;
        }
        .nbfc-name{
            font-size:24px;
            font-weight:800;
            color:white;
        }
        .details-grid{
            display:grid;
            grid-template-columns:repeat(3,1fr);
            gap:10px;
            margin:15px 0;
        }
        .detail-item{
            text-align:center;
            background:rgba(255,255,255,.15);
            padding:10px;
            border-radius:10px;
        }
        .detail-label{
            font-size:13px;
            color:#e2e8f0;
        }
        .detail-value{
            font-size:15px;
            font-weight:bold;
            color:white;
        }
        .apply-btn{
            display:block;
            text-align:center;
            background:#10b981;
            color:white;
            padding:14px;
            border-radius:10px;
            text-decoration:none;
            font-weight:700;
            margin-top:10px;
        }
        .apply-btn:hover{ background:#059669; }
        #validity {
            text-align: center;
            font-weight: bold;
            color: #1e40af;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<header class="top-header">
    <div class="header-left">
        <img src="logo.png" class="header-logo" alt="Logo">
        <div class="app-name">D-LOAN OFFERS</div>
    </div>
</header>

<script>
    const params = new URLSearchParams(window.location.search);
    const pan = params.get("user");
    const reportData = JSON.parse(localStorage.getItem("REPORT_" + pan));

    if(!reportData){
        alert("No report found");
        window.location.href = "credit-score.html";
    }
</script>

<div class="container">
    <div class="report-card">
        <div class="report-header">
            <h1>Credit Assessment Report</h1>
            <h1 id="reportScore"></h1>
            <p>Generated Report</p>
        </div>
        <div id="validity"></div>
        
        <div class="score-section">
            <div class="score-circle">
                <div class="score-number" id="score">0</div>
                <div class="score-text">Credit Score</div>
            </div>
            <div class="rating" id="rating">Good</div>
            <div class="approval" id="approval">80% Approval Chance</div>
        </div>

        <div class="btn-row">
            <button class="btn btn-primary" onclick="window.print()">Print Report</button>
            <button class="btn btn-success" onclick="window.location.href='credit-score.html'">New Assessment</button>
        </div>
    </div>

    <div class="report-card">
        <h2 class="section-title">Applicant Details</h2>
        <div class="grid">
            <div class="info-box">
                <div class="info-label">Full Name</div>
                <div class="info-value" id="fullName"></div>
            </div>
            <div class="info-box">
                <div class="info-label">Mobile</div>
                <div class="info-value" id="mobile"></div>
            </div>
            <div class="info-box">
                <div class="info-label">PAN</div>
                <div class="info-value" id="pan"></div>
            </div>
            <div class="info-box">
                <div class="info-label">City</div>
                <div class="info-value" id="city"></div>
            </div>
            <div class="info-box">
                <div class="info-label">Monthly Income</div>
                <div class="info-value" id="income"></div>
            </div>
            <div class="info-box">
                <div class="info-label">Employment</div>
                <div class="info-value" id="employment"></div>
            </div>
        </div>
    </div>

    <div class="report-card">
        <h2 class="section-title">Credit Analysis Summary</h2>
        <div class="grid">
            <div class="info-box">
                <div class="info-label">Current Loan Amount</div>
                <div class="info-value" id="loanAmount"></div>
            </div>
            <div class="info-box">
                <div class="info-label">Current EMI</div>
                <div class="info-value" id="emi"></div>
            </div>
            <div class="info-box">
                <div class="info-label">Credit Card</div>
                <div class="info-value" id="card"></div>
            </div>
            <div class="info-box">
                <div class="info-label">Missed EMI</div>
                <div class="info-value" id="missed"></div>
            </div>
