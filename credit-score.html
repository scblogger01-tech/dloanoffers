<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Credit Score Assessment</title>
<style>
:root{--bg:#0f172a;--glass:rgba(255,255,255,.08);--text:#fff;--accent:#22c55e}
*{box-sizing:border-box}
body{margin:0;font-family:Arial,sans-serif;background:linear-gradient(135deg,#0f172a,#1e293b);color:var(--text)}
.container{max-width:1000px;margin:auto;padding:20px}
.glass{background:var(--glass);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:20px}
h1{text-align:center}
label{display:block;margin:10px 0 5px}
input,select,button{width:100%;padding:12px;border-radius:10px;border:none}
button{background:#2563eb;color:#fff;font-weight:bold;cursor:pointer;margin-top:12px}
#resetBtn{display:none;background:#dc2626}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px}
#result,#offers,#leadBox{display:none}
.offer{background:rgba(255,255,255,.08);padding:15px;border-radius:15px}
.offer a{display:block;background:#22c55e;color:white;text-decoration:none;padding:10px;border-radius:8px;text-align:center}
.center{text-align:center}
#loading{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);justify-content:center;align-items:center;z-index:999}
.loaderbox{background:#fff;color:#000;padding:25px;border-radius:15px;text-align:center}
svg{max-width:260px}
@media(max-width:600px){h1{font-size:24px}}
</style>
</head>
<body>
<div id="loading"><div class="loaderbox"><h2>Analyzing...</h2><p id="ltxt">Checking Profile...</p></div></div>

<div class="container">
<div class="glass">
<h1>💳 Premium Credit Score Assessment</h1>

<div class="grid">
<div><label>Age</label><input id="age"></div>
<div><label>Income</label><input id="income"></div>
<div><label>Loan Amount</label><input id="loan"></div>
<div><label>EMI</label><input id="emi"></div>
<div><label>City</label><input id="city"></div>
<div><label>Country</label><input id="country" value="India"></div>
<div><label>Credit Card</label><select id="card"><option value="">Select</option><option value="yes">Yes</option><option value="no">No</option></select></div>
<div><label>Missed EMI</label><select id="missed"><option value="">Select</option><option value="no">No</option><option value="yes">Yes</option></select></div>
</div>

<button id="submitBtn" onclick="generate()">Generate Score</button>
<button id="resetBtn" onclick="resetAssessment()">Start New Assessment</button>

<div id="result" class="center">
<svg viewBox="0 0 200 120">
<path d="M20 100 A80 80 0 0 1 180 100" stroke="#334155" stroke-width="16" fill="none"/>
<path id="gauge" d="M20 100 A80 80 0 0 1 180 100" stroke="#22c55e" stroke-width="16" fill="none" stroke-dasharray="252" stroke-dashoffset="252"/>
<text x="100" y="95" text-anchor="middle" fill="white" font-size="26" id="score">0</text>
</svg>
<h2 id="approval"></h2>
<p id="date"></p>
<button onclick="downloadPDF()">Download PDF Report</button>
</div>

<div id="offers">
<h2>🏦 Recommended Loan Offers</h2>
<div class="grid" id="offerGrid"></div>
</div>

<div id="leadBox" class="center">
<h3>WhatsApp Consultation</h3>
<input id="mobile" placeholder="Enter WhatsApp Number">
<button onclick="sendWhatsApp()">Get Expert Call</button>
</div>

</div>
</div>

<script>
function validate(){
for(let el of document.querySelectorAll('input,select')){
if(el.id==='mobile') continue;
if(!el.value.trim()){alert('All fields are mandatory');return false;}
}
return true;
}

function generate(){
if(!validate()) return;

loading.style.display='flex';
let msgs=['Checking Income Stability','Analyzing Repayment Capacity','Evaluating Credit Behaviour','Generating Report'];
let i=0;
let t=setInterval(()=>{ltxt.innerText=msgs[i%msgs.length];i++;},1000);

setTimeout(()=>{
clearInterval(t);
loading.style.display='none';

let score=650;
if(+age.value>30) score+=40;
if(+income.value>50000) score+=50;
if(card.value==='yes') score+=30;
if(missed.value==='yes') score-=120;
score=Math.max(300,Math.min(900,score));

show(score);
},4000);
}

function show(scoreVal){
result.style.display='block';
offers.style.display='block';
leadBox.style.display='block';

let cur=0;
let anim=setInterval(()=>{
cur+=5;
if(cur>=scoreVal){cur=scoreVal;clearInterval(anim);confetti();}
score.innerText=cur;
let p=(cur-300)/600;
gauge.style.strokeDashoffset=252-(252*p);
},15);

let app=Math.round(scoreVal/900*100);
approval.innerText=app+'% Loan Approval Chance';
date.innerText='Assessment Date: '+new Date().toLocaleDateString();

localStorage.setItem('creditData',JSON.stringify({score:scoreVal,app,date:date.innerText}));
renderOffers(scoreVal);
lockForm();
}

function renderOffers(s){
let premium=s>=750;
offerGrid.innerHTML=(premium?[
'HDFC Personal Loan','ICICI Instant Loan','Axis Bank Loan','Kotak Pre-Approved'
]:['Navi','MoneyView','KreditBee','True Balance'])
.map(x=>`<div class="offer"><h3>${x}</h3><p>Eligible Offer</p><a href="#">Apply Now</a></div>`).join('');
}

function lockForm(){
document.querySelectorAll('input,select').forEach(e=>{if(e.id!=='mobile')e.disabled=true;});
submitBtn.style.display='none';
resetBtn.style.display='block';
}

function resetAssessment(){
localStorage.removeItem('creditData');
location.reload();
}

window.onload=()=>{
let d=localStorage.getItem('creditData');
if(!d) return;
d=JSON.parse(d);
result.style.display='block';
offers.style.display='block';
leadBox.style.display='block';
score.innerText=d.score;
approval.innerText=d.app+'% Loan Approval Chance';
date.innerText=d.date;
gauge.style.strokeDashoffset=252-(252*((d.score-300)/600));
renderOffers(d.score);
lockForm();
}

function sendWhatsApp(){
let n=document.getElementById('mobile').value;
if(!n){alert('Enter number');return;}
window.open('https://wa.me/'+n,'_blank');
}

function downloadPDF(){
window.print();
}

function confetti(){
if(parseInt(score.innerText)<750) return;
for(let i=0;i<80;i++){
let d=document.createElement('div');
d.style.cssText='position:fixed;width:8px;height:8px;background:hsl('+Math.random()*360+',100%,50%);left:'+Math.random()*100+'%;top:-10px;z-index:9999';
document.body.appendChild(d);
let y=0;
let a=setInterval(()=>{y+=5;d.style.top=y+"px";if(y>innerHeight){clearInterval(a);d.remove();}},20);
}
}
</script>
</body>
</html>
