<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Professional Credit Score Estimator</title>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial,sans-serif;background:#f4f7fb;color:#222}
.container{max-width:900px;margin:auto;padding:20px}
.card{background:#fff;border-radius:18px;padding:20px;box-shadow:0 4px 15px rgba(0,0,0,.08)}
h1{text-align:center;color:#1E40AF}
label{display:block;margin-top:12px;font-weight:bold}
input,select,button{width:100%;padding:12px;border-radius:10px}
input,select{border:1px solid #d6d6d6}
button{border:none;background:#1E40AF;color:#fff;font-weight:bold;cursor:pointer;margin-top:15px}
#resetBtn{display:none;background:#dc2626}
#resultBox,#offers,#meterWrap{display:none}
.meter{width:200px;height:200px;border-radius:50%;margin:20px auto;display:flex;align-items:center;justify-content:center;font-size:42px;font-weight:bold;color:#1E40AF;background:conic-gradient(#10b981 0deg,#e5e7eb 0deg)}
.approval{text-align:center;font-size:24px;font-weight:bold}
.loan-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:15px}
.loan-card{background:#fff;padding:15px;border-radius:14px;box-shadow:0 4px 10px rgba(0,0,0,.08)}
.loan-card a{display:block;text-align:center;background:#10b981;color:#fff;text-decoration:none;padding:10px;border-radius:8px}
#loadingScreen{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);justify-content:center;align-items:center;z-index:9999}
.loading-box{background:#fff;padding:25px;border-radius:15px;text-align:center;width:90%;max-width:400px}
.spinner{width:60px;height:60px;border:5px solid #ddd;border-top:5px solid #1E40AF;border-radius:50%;margin:auto;animation:spin 1s linear infinite}
@keyframes spin{100%{transform:rotate(360deg)}}
.date{text-align:center;margin-top:10px}
</style>
</head>
<body>
<div class="container">
<div class="card">
<h1>📈 Credit Score Estimator</h1>

<label>Age</label><input id="age" type="number" required>
<label>Monthly Net Income</label><input id="income" type="number" required>
<label>Existing Loan Amount</label><input id="loanAmount" type="number" required>
<label>Current EMI</label><input id="emi" type="number" required>
<label>Occupation</label>
<select id="occupation" required>
<option value="">Select</option><option>Salaried</option><option>Business</option><option>Self Employed</option><option>Student</option>
</select>
<label>Work Experience</label>
<select id="experience" required>
<option value="">Select</option><option>0-1</option><option>1-3</option><option>3-5</option><option>5+</option>
</select>
<label>City</label><input id="city" required>
<label>Country</label><input id="country" value="India" required>
<label>Have Credit Card?</label><select id="card" required><option value="">Select</option><option value="yes">Yes</option><option value="no">No</option></select>
<label>Any EMI Missed?</label><select id="missed" required><option value="">Select</option><option value="no">No</option><option value="yes">Yes</option></select>

<button id="submitBtn" onclick="generateScore()">Generate Credit Score</button>
<button id="resetBtn" onclick="resetAssessment()">🔄 Start New Assessment</button>

<div id="resultBox">
<div id="meterWrap"><div class="meter" id="meter"><span id="scoreNumber">0</span></div></div>
<div class="approval" id="approval"></div>
<div class="date" id="assessmentDate"></div>
</div>
</div>

<div id="offers">
<h2>🎯 Matched Loan Offers</h2>
<div class="loan-grid" id="loanGrid"></div>
</div>
</div>

<div id="loadingScreen">
<div class="loading-box">
<div class="spinner"></div>
<h3>Analyzing Your Financial Profile...</h3>
<p id="loadingText">Checking Income Stability...</p>
</div>
</div>

<script>
function validateFields(){
 let fields=document.querySelectorAll('input,select');
 for(let f of fields){
   if(!f.value.trim()){ alert('Please fill all fields'); return false; }
 }
 return true;
}

function generateScore(){
 if(!validateFields()) return;

 let score=650;
 let age=+age.value, income=+income.value, loan=+loanAmount.value, emiVal=+emi.value;
 if(age>=25) score+=20;
 if(age>=30) score+=20;
 if(income>30000) score+=30;
 if(income>50000) score+=40;
 if(card.value==='yes') score+=30;
 if(experience.value==='3-5') score+=20;
 if(experience.value==='5+') score+=40;
 if(loan>500000) score-=40;
 if(emiVal>20000) score-=30;
 if(missed.value==='yes') score-=100;
 score=Math.max(300,Math.min(900,score));

 loadingScreen.style.display='flex';
 const msgs=['Checking Income Stability...','Analyzing Repayment Capacity...','Evaluating Credit Behaviour...','Generating Financial Profile...'];
 let i=0;
 let t=setInterval(()=>{loadingText.innerText=msgs[i++]||msgs[3]},1000);

 setTimeout(()=>{
 clearInterval(t);
 loadingScreen.style.display='none';
 showResult(score);
 },4000);
}

function showResult(score){
 resultBox.style.display='block';
 meterWrap.style.display='block';
 offers.style.display='block';

 let approval=Math.round(score/900*100);
 let current=0;
 let anim=setInterval(()=>{
 current+=5;
 if(current>=score){current=score;clearInterval(anim)}
 scoreNumber.innerText=current;
 let deg=(current/900)*360;
 meter.style.background='conic-gradient(#10b981 '+deg+'deg,#e5e7eb '+deg+'deg)';
 },15);

 approval.innerHTML=approval+'% Loan Approval Chance';
 document.getElementById('approval').innerText=approval+'% Loan Approval Chance';

 let date=new Date().toLocaleDateString();
 assessmentDate.innerText='Assessment Date: '+date;

 saveAssessment(score,approval,date);
 renderOffers(score);
 lockForm();
}

function renderOffers(score){
 let data = score>=750 ?
 ['Premium Personal Loan','Home Loan','Business Loan','Pre-approved Credit Card'] :
 ['Navi Loan','MoneyView','True Balance','KreditBee'];

 loanGrid.innerHTML=data.map(x=>`<div class="loan-card"><h3>${x}</h3><p>Eligible Offer</p><a href="#">Apply Now</a></div>`).join('');
}

function saveAssessment(score,approval,date){
 localStorage.setItem('creditAssessment',JSON.stringify({score,approval,date}));
}

function lockForm(){
 document.querySelectorAll('input,select').forEach(x=>x.disabled=true);
 submitBtn.style.display='none';
 resetBtn.style.display='block';
}

window.onload=function(){
 let saved=localStorage.getItem('creditAssessment');
 if(!saved) return;
 let d=JSON.parse(saved);
 resultBox.style.display='block';
 meterWrap.style.display='block';
 offers.style.display='block';
 scoreNumber.innerText=d.score;
 let deg=(d.score/900)*360;
 meter.style.background='conic-gradient(#10b981 '+deg+'deg,#e5e7eb '+deg+'deg)';
 document.getElementById('approval').innerText=d.approval+'% Loan Approval Chance';
 assessmentDate.innerText='Assessment Date: '+d.date;
 renderOffers(d.score);
 lockForm();
}

function resetAssessment(){
 localStorage.removeItem('creditAssessment');
 location.reload();
}
</script>
</body>
</html>
